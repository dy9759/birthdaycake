<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>吹蜡烛 · 生日快乐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#160d24; --bg2:#2c1742; --bg3:#3a1d3f;
    --cream:#FFF3E2; --cream-sh:#F2D9BC;
    --pink:#F19FC0; --pink-dk:#D8729F;
    --sponge:#F7CDA0; --sponge-dk:#E2A878;
    --plate:#ECDDCC; --plate-sh:#C9B4A0;
    --gold:#F6C453; --flame:#FF9D2E; --flame-in:#FFE9A8;
    --ink:#FFF6EA; --muted:#C9B4D8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Noto Sans SC",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% 12%, rgba(255,176,77,.16), transparent 55%),
      radial-gradient(140% 120% at 50% 120%, var(--bg3), transparent 60%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    overflow:hidden; position:relative; touch-action:manipulation;
  }
  /* drifting ambient sparkles */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.0;
    animation:twinkle 4s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.7;transform:scale(1)}}

  header{z-index:2;text-align:center;margin-top:30px;padding:0 18px;transition:opacity .5s}
  .eyebrow{font-size:13px;letter-spacing:.42em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
  h1{font-family:"ZCOOL KuaiLe",cursive;font-weight:400;font-size:clamp(30px,8vw,52px);
    line-height:1;background:linear-gradient(180deg,#fff,#FFD9A8);-webkit-background-clip:text;
    background-clip:text;color:transparent;filter:drop-shadow(0 2px 10px rgba(255,160,60,.25))}
  .sub{margin-top:10px;color:var(--muted);font-size:14px;min-height:20px;transition:color .3s}

  /* ---- scene ---- */
  .scene{z-index:2;position:relative;flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;max-width:520px}
  .glow{position:absolute;top:-30px;left:50%;transform:translateX(-50%);
    width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,170,70,.45), transparent 65%);
    filter:blur(6px);opacity:0;transition:opacity .8s;pointer-events:none}
  .scene.lit .glow{opacity:1}

  .cake{position:relative;width:230px;cursor:default;transform:translateY(6px)}
  .cake .candles{position:absolute;left:0;right:0;top:-58px;display:flex;justify-content:center;
    gap:18px;z-index:5}
  .candle{position:relative;width:11px;height:62px;border-radius:4px;
    background:repeating-linear-gradient(45deg,#fff 0 6px,#ff7eb0 6px 12px);
    box-shadow:inset -3px 0 rgba(0,0,0,.12), 0 2px 4px rgba(0,0,0,.25);cursor:pointer}
  .candle::after{content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);
    width:2px;height:6px;background:#3a2a1a;border-radius:2px} /* wick */
  .flame{position:absolute;top:-26px;left:50%;width:16px;height:26px;margin-left:-8px;
    border-radius:50% 50% 50% 50%/ 60% 60% 40% 40%;
    background:radial-gradient(circle at 50% 75%, var(--flame-in), var(--flame) 55%, #ff5e2e 100%);
    transform-origin:50% 90%;opacity:0;transform:scaleY(.2);
    box-shadow:0 0 14px 6px rgba(255,150,50,.55), 0 0 38px 14px rgba(255,130,40,.30);
    transition:opacity .12s}
  .candle.on .flame{opacity:1;animation:flicker .28s ease-in-out infinite alternate}
  @keyframes flicker{
    0%{transform:scaleY(1) rotate(-3deg) translateX(-.3px);box-shadow:0 0 14px 6px rgba(255,150,50,.55),0 0 40px 16px rgba(255,130,40,.30)}
    100%{transform:scaleY(1.08) rotate(3deg) translateX(.3px);box-shadow:0 0 18px 8px rgba(255,170,60,.6),0 0 50px 20px rgba(255,140,40,.35)}
  }

  /* cake body */
  .tier{position:relative;margin:0 auto;border-radius:14px 14px 8px 8px;
    box-shadow:inset 0 -8px 0 rgba(0,0,0,.06), 0 8px 18px rgba(20,8,30,.45)}
  .top{width:172px;height:60px;background:linear-gradient(180deg,var(--pink),var(--pink-dk));
    z-index:3}
  .icing{width:182px;height:30px;margin:-22px auto 0;position:relative;z-index:4;
    background:var(--cream);border-radius:16px;box-shadow:0 6px 10px rgba(20,8,30,.25)}
  /* drips */
  .icing::before,.icing::after{content:"";position:absolute;bottom:-9px;width:18px;height:18px;
    background:var(--cream);border-radius:50%}
  .icing::before{left:24px;box-shadow:46px 3px 0 -1px var(--cream),92px -1px 0 0 var(--cream),130px 4px 0 -2px var(--cream)}
  .icing::after{right:20px;width:14px;height:14px;box-shadow:-118px 6px 0 -3px var(--cream)}
  .bottom{width:230px;height:78px;margin-top:-6px;
    background:linear-gradient(180deg,var(--sponge),var(--sponge-dk));z-index:2}
  .bottom::before{content:"";position:absolute;top:18px;left:0;right:0;height:14px;
    background:repeating-linear-gradient(90deg,transparent 0 14px,rgba(255,255,255,.35) 14px 22px)}
  .plate{width:280px;height:26px;margin:-10px auto 0;border-radius:50%;
    background:radial-gradient(ellipse at 50% 35%,var(--plate),var(--plate-sh));
    box-shadow:0 16px 26px rgba(10,4,18,.55);z-index:1}

  .smoke{position:absolute;width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle,rgba(220,220,230,.8),rgba(200,200,210,0) 70%);
    pointer-events:none;z-index:6}

  /* ---- controls ---- */
  .controls{z-index:3;display:flex;flex-direction:column;align-items:center;gap:14px;
    margin:6px 0 26px;width:100%;max-width:360px;padding:0 22px}
  .row{display:flex;gap:12px;width:100%}
  button{flex:1;font-family:inherit;font-size:16px;font-weight:500;color:#2a1326;
    border:none;border-radius:999px;padding:15px 18px;cursor:pointer;
    background:linear-gradient(180deg,#FFE7B0,var(--gold));
    box-shadow:0 6px 0 #c79224,0 10px 18px rgba(0,0,0,.3);transition:transform .08s,box-shadow .08s}
  button:active{transform:translateY(4px);box-shadow:0 2px 0 #c79224,0 5px 10px rgba(0,0,0,.3)}
  button.ghost{background:transparent;color:var(--ink);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.28)}
  button.ghost:active{transform:translateY(2px);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.28)}
  button:disabled{opacity:.4;pointer-events:none}

  .mic{width:100%;display:flex;flex-direction:column;gap:8px;align-items:center}
  .mic-hint{font-size:13px;color:var(--muted);text-align:center;min-height:18px}
  .meter{width:100%;height:10px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;display:none}
  .meter.show{display:block}
  .meter > i{display:block;height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,#7ee0a0,var(--gold),#ff8a4d);transition:width .06s}

  .confetti{position:fixed;top:-12px;width:9px;height:14px;z-index:9;border-radius:2px;pointer-events:none}

  footer{z-index:2;font-size:11px;color:rgba(255,255,255,.3);padding-bottom:14px;text-align:center}
</style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <header>
    <div class="eyebrow">Make a wish</div>
    <h1>生日快乐</h1>
    <p class="sub" id="sub">先点燃蜡烛,再许个愿吹灭它 🎂</p>
  </header>

  <div class="scene" id="scene">
    <div class="glow"></div>
    <div class="cake" id="cake">
      <div class="candles" id="candles"></div>
      <div class="tier top"></div>
      <div class="icing"></div>
      <div class="tier bottom"></div>
    </div>
  </div>
  <div class="plate" style="position:relative;z-index:2;margin-top:-30px"></div>

  <div class="controls">
    <div class="row">
      <button id="lightBtn">🔥 点燃蜡烛</button>
      <button id="blowBtn" class="ghost">💨 吹一口气</button>
    </div>
    <div class="mic">
      <button id="micBtn" class="ghost">🎤 用麦克风吹</button>
      <div class="meter" id="meter"><i id="meterBar"></i></div>
      <div class="mic-hint" id="micHint"></div>
    </div>
  </div>

  <footer>点蜡烛可单独点燃 · 对着麦克风吹气熄灭</footer>

<script>
(function(){
  const CANDLE_COUNT = 5;
  const candlesEl = document.getElementById('candles');
  const scene = document.getElementById('scene');
  const sub = document.getElementById('sub');
  const lightBtn = document.getElementById('lightBtn');
  const blowBtn = document.getElementById('blowBtn');
  const micBtn = document.getElementById('micBtn');
  const meter = document.getElementById('meter');
  const meterBar = document.getElementById('meterBar');
  const micHint = document.getElementById('micHint');
  const cake = document.getElementById('cake');

  // build candles
  const candles = [];
  for(let i=0;i<CANDLE_COUNT;i++){
    const c = document.createElement('div');
    c.className='candle';
    c.innerHTML='<div class="flame"></div>';
    c.addEventListener('click',()=>lightOne(i));
    candlesEl.appendChild(c);
    candles.push(c);
  }

  function litCount(){return candles.filter(c=>c.classList.contains('on')).length}
  function anyLit(){return litCount()>0}

  function updateScene(){
    if(anyLit()){scene.classList.add('lit')} else {scene.classList.remove('lit')}
    blowBtn.disabled = !anyLit();
    micBtn.disabled = false;
  }

  function lightOne(i){
    if(candles[i].classList.contains('on')) return;
    candles[i].classList.add('on');
    updateScene();
    sub.textContent='许个愿……然后吹灭它 ✨';
  }

  lightBtn.addEventListener('click',()=>{
    candles.forEach((c,i)=>setTimeout(()=>{c.classList.add('on');updateScene();},i*120));
    sub.textContent='许个愿……然后吹灭它 ✨';
    celebrated=false;
  });

  function puffSmoke(candle){
    const rect = candle.getBoundingClientRect();
    const sceneRect = document.body.getBoundingClientRect();
    for(let k=0;k<4;k++){
      const s=document.createElement('div');
      s.className='smoke';
      s.style.left=(rect.left - sceneRect.left + 1 + (Math.random()*6-3))+'px';
      s.style.top=(rect.top - sceneRect.top - 24)+'px';
      document.body.appendChild(s);
      const dx=(Math.random()*40-20), dy=-70-Math.random()*60, sc=2.2+Math.random()*1.6;
      s.animate([
        {transform:'translate(0,0) scale(.5)',opacity:.0},
        {transform:`translate(${dx*.4}px,${dy*.4}px) scale(${sc*.7})`,opacity:.55,offset:.4},
        {transform:`translate(${dx}px,${dy}px) scale(${sc})`,opacity:0}
      ],{duration:1300+Math.random()*500,easing:'ease-out'}).onfinish=()=>s.remove();
    }
  }

  let blowing=false;
  function blowOut(){
    if(!anyLit()||blowing) return;
    blowing=true;
    const lit = candles.filter(c=>c.classList.contains('on'));
    lit.forEach((c,idx)=>{
      setTimeout(()=>{
        c.classList.remove('on');
        puffSmoke(c);
        updateScene();
        if(idx===lit.length-1){
          blowing=false;
          setTimeout(()=>{ if(!anyLit()) celebrate(); },220);
        }
      }, idx*130);
    });
  }
  blowBtn.addEventListener('click',blowOut);

  // ---------- celebration ----------
  let celebrated=false;
  const COLORS=['#F6C453','#F19FC0','#7ee0a0','#7cc0ff','#ff8a4d','#fff'];
  function celebrate(){
    if(celebrated) return; celebrated=true;
    sub.textContent='🎉 愿望一定会成真的 · 生日快乐!';
    const n=90;
    for(let i=0;i<n;i++){
      const conf=document.createElement('div');
      conf.className='confetti';
      conf.style.left=Math.random()*100+'vw';
      conf.style.background=COLORS[i%COLORS.length];
      conf.style.transform=`rotate(${Math.random()*360}deg)`;
      if(Math.random()<.3) conf.style.borderRadius='50%';
      document.body.appendChild(conf);
      const dur=2600+Math.random()*1800;
      conf.animate([
        {transform:`translateY(0) rotate(0deg)`,opacity:1},
        {transform:`translateY(${window.innerHeight+60}px) rotate(${Math.random()*720-360}deg) translateX(${Math.random()*160-80}px)`,opacity:1}
      ],{duration:dur,easing:'cubic-bezier(.3,.6,.5,1)'}).onfinish=()=>conf.remove();
    }
    cake.animate([{transform:'translateY(6px) scale(1)'},{transform:'translateY(6px) scale(1.06)'},{transform:'translateY(6px) scale(1)'}],{duration:600,easing:'ease-out'});
  }

  // ---------- microphone blow ----------
  let micOn=false, audioCtx=null, rafId=null, micStream=null;
  micBtn.addEventListener('click', async ()=>{
    if(micOn){ stopMic(); return; }

    // 环境不支持(常见于预览窗口的沙箱限制)
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      micHint.innerHTML='⚠️ 当前预览窗口不允许用麦克风。<br>把文件下载、用手机/电脑的浏览器打开就能吹了。先用上面的「💨 吹一口气」也行。';
      return;
    }

    micHint.textContent='正在请求麦克风权限…';
    let stream;
    try{
      stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    }catch(err){
      let msg;
      if(err.name==='NotAllowedError'||err.name==='SecurityError'){
        msg='🚫 麦克风权限被拒绝 / 被预览窗口拦住了。下载文件用浏览器打开,并允许麦克风即可。';
      }else if(err.name==='NotFoundError'){
        msg='🎙️ 没检测到麦克风设备。';
      }else{
        msg='麦克风启动失败('+err.name+')。';
      }
      micHint.innerHTML=msg+'<br>没关系,上面的「💨 吹一口气」按钮一样能吹灭 😊';
      meter.classList.remove('show');
      return;
    }

    micStream=stream;
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended'){ try{await audioCtx.resume();}catch(e){} }
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    src.connect(analyser);
    const freq = new Uint8Array(analyser.frequencyBinCount);

    micOn=true;
    micBtn.textContent='🛑 关闭麦克风';
    meter.classList.add('show');

    // 低频「吹气」能量:吹气主要集中在低频段
    const binHz = audioCtx.sampleRate / analyser.fftSize;
    const maxBin = Math.max(6, Math.floor(500 / binHz)); // ~0–500Hz
    let smooth=0, baseline=0, sustain=0;
    let calibFrames=0; const CALIB=40; let calibSum=0;
    micHint.textContent='校准环境噪音中,请先安静约 1 秒…';

    (function loop(){
      analyser.getByteFrequencyData(freq);
      let sum=0;
      for(let i=1;i<maxBin;i++) sum+=freq[i];
      const energy = sum/(maxBin-1)/255;        // 0..1
      smooth += (energy - smooth)*0.5;

      if(calibFrames<CALIB){
        calibSum+=smooth; calibFrames++;
        if(calibFrames===CALIB){
          baseline=calibSum/CALIB;
          micHint.textContent='✅ 好了,对着麦克风用力吹气 💨';
        }
        meterBar.style.width='0%';
        rafId=requestAnimationFrame(loop); return;
      }

      // 触发阈值:高出环境噪音一截,且有下限
      const thresh = Math.max(baseline+0.07, baseline*2.2, 0.10);
      const pct = Math.min(100, ((smooth-baseline)/(thresh-baseline))*70);
      meterBar.style.width=Math.max(0,pct)+'%';

      if(anyLit() && smooth>thresh){ sustain++; } else { sustain=Math.max(0,sustain-1); }
      if(sustain>=3 && anyLit()){ sustain=0; blowOut(); }

      rafId=requestAnimationFrame(loop);
    })();
  });

  function stopMic(){
    micOn=false; if(rafId)cancelAnimationFrame(rafId);
    if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
    if(audioCtx){ audioCtx.close(); audioCtx=null; }
    micBtn.textContent='🎤 用麦克风吹';
    meter.classList.remove('show'); meterBar.style.width='0%';
    micHint.textContent='';
  }

  // ---------- ambient stars ----------
  const starWrap=document.getElementById('stars');
  for(let i=0;i<26;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*70+'vh';
    s.style.animationDelay=(Math.random()*4)+'s';
    starWrap.appendChild(s);
  }

  updateScene();
})();
</script>
</body>
</html>
